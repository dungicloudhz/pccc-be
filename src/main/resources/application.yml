spring:
  application:
    name: pccc-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/pccc_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8081
  servlet:
    context-path: /
  address: 0.0.0.0

# CORS Configuration
# allowedOriginPatterns: "*" = Cho phép TẤT CẢ origins
# allowCredentials: false = Không cần credentials (cookies, JWT)
cors:
  allow-credentials: false
  max-age: 86400

logging:
  level:
    root: INFO
    com.cozyquoteforge: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG


